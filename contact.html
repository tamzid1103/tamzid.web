<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Tamzid</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-5xl grid md:grid-cols-2 gap-8">

        <!-- LEFT SIDE (INFO) -->
        <div class="flex flex-col justify-center space-y-6">
            <h1 class="text-4xl font-bold">Get In Touch</h1>

            <p class="text-lg">
                Want to collaborate, ask something, or schedule a meeting?
                Fill out the form and I’ll get back to you.
            </p>

            <div class="space-y-3">
                <p><strong>Email:</strong> tamzidul241-15-877@diu.edu.bd</p>
                <p><strong>Phone:</strong> +8801822973209</p>
            </div>

            <!-- Back Button (Improved) -->
            <a href="index.html"
                class="inline-block w-fit bg-white text-blue-600 px-6 py-3 rounded-full font-semibold shadow hover:scale-105 transition">
                ← Back to Home
            </a>
        </div>

        <!-- RIGHT SIDE (FORM) -->
        <div class="bg-white text-gray-800 p-8 rounded-xl shadow-lg">

            <h2 class="text-2xl font-bold mb-4 text-center">Book a Meeting</h2>

            <form class="space-y-4">

                <input type="text" placeholder="Your Name"
                    class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>

                <input type="email" placeholder="Your Email"
                    class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>

                <!-- DATE PICKER -->
                <div>
                    <label class="text-sm font-semibold">Select Date</label>
                    <input type="date"
                        class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- TIME PICKER -->
                <div>
                    <label class="text-sm font-semibold">Select Time</label>
                    <input type="time"
                        class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <textarea placeholder="Your Message"
                    class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    rows="3"></textarea>

                <button class="w-full bg-blue-600 text-white py-3 rounded font-semibold hover:bg-blue-700 transition">
                    Send Request
                </button>

            </form>
        </div>

    </div>

</body>

</html>
