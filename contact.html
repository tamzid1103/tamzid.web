<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Tamzid</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-6xl grid md:grid-cols-2 gap-8">

        <!-- LEFT -->
        <div class="flex flex-col justify-center space-y-6">
            <h1 class="text-4xl font-bold">Let's Connect</h1>

            <p class="text-lg">
                Whether you want to collaborate, ask questions, or schedule a meeting —
                feel free to reach out.
            </p>

            <div>
                <p><strong>Email:</strong> tamzidul241-15-877@diu.edu.bd</p>
                <p><strong>Phone:</strong> +8801822973209</p>
            </div>

            <!-- REAL BOOKING BUTTON -->
            <a href="https://calendar.google.com/appointments/s/abc123" target="_blank"
                class="bg-white text-blue-600 px-6 py-3 rounded-full font-semibold shadow hover:scale-105 transition w-fit">
                📅 Book a Meeting
            </a>

            <!-- Back Button -->
            <a href="index.html" class="underline mt-2 hover:text-gray-200">
                ← Back to Home
            </a>
        </div>

        <!-- FORM -->
        <div class="bg-white text-gray-800 p-8 rounded-xl shadow-lg">

            <h2 class="text-2xl font-bold mb-4 text-center">Send a Message</h2>

            <!-- FORMSpree Connected -->
            <form action="https://formspree.io/f/xgonqpnp" method="POST" class="space-y-4">

                <input type="text" name="name" placeholder="Your Name" class="w-full p-3 border rounded" required>

                <input type="email" name="email" placeholder="Your Email" class="w-full p-3 border rounded" required>

                <textarea name="message" placeholder="Your Message" class="w-full p-3 border rounded" rows="4"
                    required></textarea>

                <button class="w-full bg-blue-600 text-white py-3 rounded font-semibold hover:bg-blue-700 transition">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</body>

</html>
