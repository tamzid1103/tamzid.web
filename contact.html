<!DOCTYPE html>
<html>

<head>
    <title>Contact - Tamzid</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-600 to-indigo-600 text-white flex items-center justify-center h-screen">

    <div class="bg-white text-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold mb-4 text-center">Contact Me</h2>

        <form>
            <input type="text" placeholder="Your Name" class="w-full p-2 mb-3 border rounded" required>
            <input type="email" placeholder="Your Email" class="w-full p-2 mb-3 border rounded" required>
            <textarea placeholder="Your Message" class="w-full p-2 mb-3 border rounded" rows="4"></textarea>

            <button class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
                Send Message
            </button>
        </form>

        <a href="index.html" class="block text-center mt-4 underline">Back to Home</a>
    </div>

</body>

</html>
